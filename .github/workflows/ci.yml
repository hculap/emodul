name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Install + smoke test on Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify CLI entrypoint
        run: |
          emodul --version
          emodul --help

      - name: Verify every subcommand has --help (no import errors)
        run: |
          for cmd in auth modules zones menu settings schedules stats alarms tiles watch skill mcp; do
            echo "--- $cmd ---"
            emodul "$cmd" --help
          done

      - name: Verify bundled SKILL.md ships in the wheel
        run: |
          emodul skill path
          emodul skill install --to /tmp/test-skill/SKILL.md
          test -f /tmp/test-skill/SKILL.md
          head -3 /tmp/test-skill/SKILL.md | grep -q '^name: emodul$'
          echo "✅ SKILL.md packaged + installable"

      - name: MCP server smoke test (initialize + tools/list via stdio)
        run: |
          set -e
          OUT=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | timeout 10 emodul mcp 2>/dev/null || true)
          echo "$OUT" | python3 -c "
          import sys, json
          tool_count = 0
          for line in sys.stdin:
              line = line.strip()
              if not line: continue
              try:
                  msg = json.loads(line)
                  if msg.get('id') == 2 and 'result' in msg:
                      tool_count = len(msg['result']['tools'])
              except: pass
          assert tool_count >= 10, f'expected ≥10 MCP tools, got {tool_count}'
          print(f'✅ MCP server exposes {tool_count} tools')
          "

      - name: Verify emodul-mcp standalone entry point also resolves
        run: |
          which emodul-mcp
          emodul-mcp --help 2>&1 | head -2 || true   # FastMCP doesn't take --help; just verify it loads

      - name: Verify Python package imports cleanly
        run: |
          python -c "import emodul; from emodul import api, auth, config, format, i18n, settings_map, storage; print('all modules import ok')"

  lint:
    name: Lint with ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check style + obvious errors
        run: ruff check emodul/ --select=E,F,I,B --ignore=E501
