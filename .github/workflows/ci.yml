name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Install + smoke test on Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify CLI entrypoint
        run: |
          emodul --version
          emodul --help

      - name: Verify every subcommand has --help (no import errors)
        run: |
          for cmd in auth modules zones menu settings schedules stats alarms tiles watch skill mcp; do
            echo "--- $cmd ---"
            emodul "$cmd" --help
          done

      - name: Verify bundled SKILL.md ships in the wheel
        run: |
          emodul skill path
          emodul skill install --to /tmp/test-skill/SKILL.md
          test -f /tmp/test-skill/SKILL.md
          head -3 /tmp/test-skill/SKILL.md | grep -q '^name: emodul$'
          echo "✅ SKILL.md packaged + installable"

      - name: MCP server smoke test (real client over stdio)
        run: |
          python3 <<'PY'
          import asyncio
          import sys
          from mcp.client.session import ClientSession
          from mcp.client.stdio import StdioServerParameters, stdio_client

          async def main() -> int:
              params = StdioServerParameters(command="emodul", args=["mcp"])
              async with stdio_client(params) as (read, write):
                  async with ClientSession(read, write) as session:
                      await asyncio.wait_for(session.initialize(), timeout=15)
                      result = await asyncio.wait_for(session.list_tools(), timeout=10)
                      tools = result.tools
                      print(f"MCP server exposes {len(tools)} tools:")
                      for t in tools:
                          print(f"  - {t.name}")
                      assert len(tools) >= 10, f"expected at least 10 tools, got {len(tools)}"
                      return 0

          sys.exit(asyncio.run(main()))
          PY

      - name: Verify emodul-mcp standalone entry point resolves
        run: |
          which emodul-mcp
          # The script itself launches the server; just verify the module imports.
          python -c "from emodul.mcp.server import main, mcp; assert callable(main)"

      - name: Verify Python package imports cleanly
        run: |
          python -c "import emodul; from emodul import api, auth, config, format, i18n, settings_map, storage; print('all modules import ok')"

  lint:
    name: Lint with ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check style + obvious errors
        run: ruff check emodul/ --select=E,F,I,B --ignore=E501
