name: Publish to PyPI

# Triggered when you push a tag like `v0.2.0`.
#
# Auth: PyPI Trusted Publishing via OIDC (no token in repo secrets).
# Setup (once, on pypi.org):
#   1. Go to https://pypi.org/manage/project/emodul/settings/publishing/
#   2. "Add a new publisher" → GitHub
#   3. Fields:
#        Owner: hculap
#        Repository name: emodul
#        Workflow name: publish.yml
#        Environment name: pypi
#   4. Save. Next tag push uses OIDC; no PYPI_API_TOKEN needed.
#
# If the PYPI_API_TOKEN secret is later removed from the repo this still works.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build

      - name: Build
        run: python -m build

      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    name: Upload to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/emodul/
    permissions:
      id-token: write    # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` — action auto-detects OIDC when id-token is granted
